name: Build, Scan, and Push DVWA Image

on:
  push:
    branches:
      - master   # DVWA's default branch is "master", not "main" — rename the branch instead if you want an exact "main" trigger

permissions:
  id-token: write   # required for AWS OIDC role assumption
  contents: read
  pull-requests: write  # only needed if you enable PR comments on the scan step

env:
  AWS_REGION: us-east-2                     # match the region your Module 2 ECS/EKS environment lives in
  ECR_REPOSITORY: dvwa-upwind-demo          # must already exist, or add a create-repo step below
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-scan-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GHA_ROLE_ARN }}   # IAM role with an OIDC trust policy for this repo
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build container image
        run: |
          docker build \
            -t ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }} \
            -t ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest \
            .

      # --- Upwind scan step: runs AFTER build, BEFORE push/deploy ---
      - name: Upwind Security ShiftLeft Scan
        uses: upwindsecurity/shiftleft-create-image-scan-event-action@main
        with:
          upwind_client_id: ${{ secrets.UPWIND_CLIENT_ID }}
          upwind_client_secret: ${{ secrets.UPWIND_CLIENT_SECRET }}
          docker_image: '${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}'
          pull_image: false
          # Uncomment to fail the pipeline on Upwind's deployment recommendation:
          # block_on: do_not_deploy   # or: deploy_with_caution
          add_comment: ${{ github.event_name == 'pull_request' }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          pr_number: ${{ github.event.pull_request.number }}
          repo_name: ${{ github.repository }}

      - name: Push image to Amazon ECR
        run: |
          docker push ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
          docker push ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest

      # --- Deployment step (placeholder) ---
      # Wire this to your Module 2 ECS service once you're ready to demo runtime correlation:
      # - name: Deploy to ECS
      #   run: |
      #     aws ecs update-service \
      #       --cluster <your-ecs-cluster> \
      #       --service <your-ecs-service> \
      #       --force-new-deployment \
      #       --region ${{ env.AWS_REGION }}
